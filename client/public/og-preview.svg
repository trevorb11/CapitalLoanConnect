<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f1e38"/>
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3259;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Decorative accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#2dd4bf"/>
  <!-- Top label -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4" fill="#2dd4bf" text-transform="uppercase">TODAY CAPITAL GROUP</text>
  <!-- Main headline -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Apply for Business</text>
  <text x="80" y="365" font-family="Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Funding</text>
  <!-- Subtext -->
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">Fast approvals · Competitive rates · 5-minute application</text>
  <!-- Domain -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="22" fill="#4b6490">app.todaycapitalgroup.com</text>
  <!-- Decorative circle -->
  <circle cx="1050" cy="315" r="200" fill="#2dd4bf" opacity="0.06"/>
  <circle cx="1050" cy="315" r="140" fill="#2dd4bf" opacity="0.06"/>
</svg>
