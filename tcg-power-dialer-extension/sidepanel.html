<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCG Power Dialer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; display: flex; flex-direction: column; }

    /* Nav bar */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 8px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 4px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #64748b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #1e293b; color: #94a3b8; }
    .nav-btn.active { background: #1e293b; color: #e2e8f0; border-color: #334155; }
    .nav-icon { font-size: 13px; }

    /* Content area */
    .content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #64748b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #loading .logo { width: 48px; height: 48px; background: #059669; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    #loading .logo span { color: white; font-size: 24px; font-weight: bold; }
    #loading .text { font-size: 13px; }
    #loading .spinner { width: 20px; height: 20px; border: 2px solid #1e293b; border-top-color: #059669; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe { width: 100%; flex: 1; border: none; display: none; }
    iframe.loaded { display: block; }
  </style>
</head>
<body>
  <div class="nav-bar">
    <button class="nav-btn active" data-path="/">
      <span class="nav-icon">&#x1F4DE;</span> Dialer
    </button>
    <button class="nav-btn" data-path="/rep-console">
      <span class="nav-icon">&#x1F464;</span> Rep Console
    </button>
    <button class="nav-btn" data-path="/dashboard">
      <span class="nav-icon">&#x1F4CA;</span> Dashboard
    </button>
    <button class="nav-btn" data-path="/sms-inbox">
      <span class="nav-icon">&#x1F4AC;</span> SMS
    </button>
  </div>
  <div class="content">
    <div id="loading">
      <div class="logo"><span>T</span></div>
      <div class="text">Loading Power Dialer...</div>
      <div class="spinner"></div>
    </div>
    <iframe id="dialer-frame" src="https://power-dialer-ten.vercel.app" allow="microphone"></iframe>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
